<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SignStix Embed</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 365px;
      height: 447px;
      overflow: hidden;
      background: transparent;
      font-family: Montserrat, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        linear-gradient(#efefef 2px, transparent 2px),
        linear-gradient(90deg, #efefef 2px, transparent 2px),
        linear-gradient(#efefef 1px, transparent 1px),
        linear-gradient(90deg, #efefef 1px, #fcfcfc 1px);
      background-size: 50px 50px, 50px 50px, 10px 10px, 10px 10px;
      background-position: -2px -2px, -2px -2px, -1px -1px, -1px -1px;
    }

    .card {
      width: 365px;
      height: 447px;
      background: #f8f8f6;
      border-radius: 40px;
      box-shadow: 0 20px 40px -14px rgba(0, 0, 0, 0.18);
      padding: 28px 26px 22px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .slide {
      display: none;
      flex-direction: column;
      height: 100%;
    }

    .slide.active {
      display: flex;
    }

    .cat {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #c34a36;
      margin-bottom: 6px;
    }

    .heading {
      font-size: 20px;
      font-weight: 700;
      color: #444;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .heading span { color: #c34a36; }

    /* ✅ FIXED MEDIA AREA */
    .img-wrap,
    .icon-wrap {
      height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 8px 0;
      flex-shrink: 0;
    }

    .img-wrap img {
      width: 190px;
      height: 190px;
      object-fit: contain;
      display: block;
    }

    .icon-circle {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: #f2cfc9;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-circle svg {
      width: 54px;
      height: 54px;
    }

    .desc {
      font-size: 12px;
      font-weight: 400;
      color: #696969;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }

    .tag {
      padding: 4px 12px;
      border-radius: 999px;
      background: #f2cfc9;
      font-size: 11px;
      font-weight: 500;
      color: #7a2a1a;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      height: 44px;
      border-radius: 999px;
      background: #c34a36;
      color: #fff;
      font-family: Montserrat, sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover { background: #a83929; }
    .btn:active { transform: scale(0.98); }

    .radio-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 14px;
    }

    .radio-row button {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: none;
      background: #d4c5c3;
      cursor: pointer;
      padding: 0;
      transition: background 0.2s, transform 0.2s;
    }

    .radio-row button.active {
      background: #c34a36;
      transform: scale(1.3);
    }
  </style>
</head>
<body>
  <!-- YOUR EXISTING HTML REMAINS UNCHANGED -->
</body>
</html>
